<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XV Tania</title>
    
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">

    <style>
        /* Importación corregida de Google Fonts para restaurar tus fuentes originales */
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap');

        /* Easy global tweaking */
        :root {
            --primary: #8e62b0; 
            --bg: rgb(224, 200, 240); 
            --card-bg: #e9d7f5; 
            --text: #2b2b2b;
            --white: #ffffff;
            --shadow: 0 8px 30px rgba(0,0,0,0.06);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Montserrat', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            line-height: 1.6; 
            overflow-x: hidden;
        }

        h1, h2, h3, .elegant-text { 
            font-family: 'Playfair Display', serif; 
            font-weight: 400; 
        }

        /* Hero Image Section */
        .hero {
            height: 100vh;
            background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.2)), url('YOUR_HERO_IMAGE_HERE.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--white);
            text-align: center;
        }

        .hero h1 { 
            font-size: clamp(4rem, 8vw, 6rem); 
            letter-spacing: 2px; 
            margin-bottom: 10px; 
            text-shadow: 2px 4px 10px rgba(0,0,0,0.3);
        }

        .hero p { 
            font-size: 1.2rem; 
            text-transform: uppercase; 
            letter-spacing: 6px; 
        }

        /* Centered Content Wrapper */
        section { 
            padding: clamp(3rem, 5vw, 5rem) 1.5rem; 
            max-width: 1000px; 
            margin: 0 auto; 
            text-align: center; 
        }

        h2 { 
            font-size: clamp(2rem, 5vw, 2.5rem); 
            margin-bottom: 2rem; 
            color: var(--primary);
        }

        .quote { 
            font-size: clamp(1.2rem, 4vw, 1.5rem); 
            color: #4a3b53; 
            margin-bottom: 3rem; 
            padding: 0 10px;
        }

        /* Clean Grid System for Cards */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 2rem; 
            margin-top: 2rem; 
        }

        .card { 
            background: var(--card-bg); 
            padding: clamp(1.5rem, 5vw, 2.5rem); 
            border-radius: 16px; 
            box-shadow: var(--shadow); 
            transition: transform 0.3s ease, box-shadow 0.3s ease; 
        }

        .card:hover { 
            transform: translateY(-8px); 
            box-shadow: 0 12px 40px rgba(0,0,0,0.1);
        }

        .card img { 
            width: 100%; 
            border-radius: 10px; 
            margin-bottom: 1.5rem; 
            object-fit: cover; 
            aspect-ratio: 4/3; 
        }

        /* Estilo especial para la foto de la quinceañera */
        .quince-photo {
            aspect-ratio: auto !important;
            max-height: 700px;
            object-position: center;
        }

        .card h3 { 
            font-size: 1.8rem; 
            margin-bottom: 1rem; 
        }

        /* Modern UI Buttons */
        .btn { 
            display: inline-block; 
            padding: 12px 28px; 
            background: var(--primary); 
            color: var(--white); 
            text-decoration: none; 
            border-radius: 50px; 
            font-weight: 600; 
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background 0.2s, transform 0.2s; 
            margin-top: 1.5rem; 
        }

        .btn:hover { 
            background: #6e4a8a; 
            transform: scale(1.05);
        }

        /* Countdown specific styles */
        .countdown-container {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: clamp(0.25rem, 2vw, 1rem); 
            margin-top: 1.5rem;
        }

        .countdown-box {
            background: rgba(255, 255, 255, 0.4);
            padding: clamp(0.5rem, 2vw, 1rem) 0.1rem; 
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .countdown-num {
            font-size: clamp(1.2rem, 6vw, 2rem); 
            font-weight: 700;
            color: var(--primary);
            line-height: 1.2;
        }
